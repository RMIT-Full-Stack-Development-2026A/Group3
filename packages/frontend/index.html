<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Google Fonts for TicTacToang Premium Aesthetics -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <title>TicTacToang | Premium Online TicTacToe Arena</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Decorative 15x15 Grid Background (from Figma) -->
    <div 
        id="bg-grid-decorative"
        class="fixed inset-0 pointer-events-none opacity-[0.03] z-[-1]"
        style="
          background-image: repeating-linear-gradient(
            0deg,
            transparent,
            transparent 40px,
            #F4AB00 40px,
            #F4AB00 41px
          ),
          repeating-linear-gradient(
            90deg,
            transparent,
            transparent 40px,
            #F4AB00 40px,
            #F4AB00 41px
          )
        "
      ></div>
  </body>
